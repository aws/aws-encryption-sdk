# This workflow performs static analysis checks.
name: Library format check

on:
  workflow_call:
    inputs:
      dafny:
        description: "The Dafny version to run"
        required: true
        type: string
      regenerate-code:
        description: "Regenerate code using smithy-dafny"
        required: false
        default: false
        type: boolean
jobs:
  format_projects:
    # Don't run the nightly build on forks
    if: github.event_name != 'schedule' || github.repository_owner == 'aws'
    strategy:
      matrix:
        os: [macos-15]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1
    steps:
      - name: Support longpaths
        run: |
          git config --global core.longpaths true

      - uses: Wandalen/wretry.action@master
        with:
          action: actions/checkout@v6
          with: |
            submodules: recursive
          attempt_limit: 3
          attempt_delay: 2000

      - name: Setup Dafny
        uses: ./mpl/.github/actions/setup_dafny
        with:
          dafny-version: ${{ inputs.dafny }}

      - name: Check format of Java code et al
        run: |
          make format_java_misc-check

      - name: Check format of Dafny code
        run: |
          make format_dafny-check

      # ensure that we format with dotnet 6
      - name: Create temporary global.json
        run: echo '{"sdk":{"rollForward":"latestFeature","version":"6.0.0"}}' > ./global.json

      - name: Check format of Dotnet code
        run: |
          make format_net-check
