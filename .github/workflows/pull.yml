# This workflow runs for every pull request
name: PR CI

on:
  pull_request:

# Concurrency control helps free up runners faster and speed up development.
# When new commits are pushed in PR, the previous workflow run is cancelled.
# If you want to not cancel previous workflow then remove this in you PR temporarily. Before merging to main add it back.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  getVersion:
    uses: ./.github/workflows/dafny_version.yaml
  getVerifyVersion:
    uses: ./.github/workflows/dafny_verify_version.yaml
  getFormatVersion:
    uses: ./.github/workflows/dafny_format_version.yaml
  pr-ci-format:
    needs: getFormatVersion
    uses: ./.github/workflows/library_format.yml
    with:
      dafny: ${{needs.getFormatVersion.outputs.version}}
  pr-ci-codegen:
    needs: getVersion
    uses: ./.github/workflows/library_codegen.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-ci-verification:
    needs: getVerifyVersion
    uses: ./.github/workflows/library_dafny_verification.yml
    with:
      dafny: ${{needs.getVerifyVersion.outputs.version}}
  # pr-ci-java:
  #   needs: getVerifyVersion
  #   uses: ./.github/workflows/library_java_tests.yml
  #   with:
  #     dafny: ${{needs.getVersion.outputs.version}}
  pr-ci-net:
    needs: getVersion
    uses: ./.github/workflows/library_net_tests.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-ci-rust:
    needs: getVersion
    uses: ./.github/workflows/library_rust_tests.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-ci-rust-duplicate-deps:
    uses: ./.github/workflows/rust_duplicate_deps.yml
  pr-ci-go:
    needs: getVersion
    uses: ./.github/workflows/library_go_tests.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-test-vectors:
    needs: getVersion
    uses: ./.github/workflows/library_interop_tests.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-dafny-keyring-test-vectors:
    needs: getVersion
    uses: ./.github/workflows/library_interop_keyring_test_vectors.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-dafny-mkp-keyring-legacy-test-vectors:
    needs: getVersion
    uses: ./.github/workflows/library_interop_mkp_test_vectors.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-dafny-legacy-test-vectors:
    needs: getVersion
    uses: ./.github/workflows/library_legacy_interop_test_vectors.yml
    with:
      dafny: ${{needs.getVersion.outputs.version}}
  pr-ci-all-required:
    if: always()
    needs:
      - pr-ci-codegen
      - pr-ci-verification
      - pr-ci-net
      - pr-ci-rust
      - pr-ci-rust-duplicate-deps
      - pr-ci-go
      - pr-test-vectors
      - pr-dafny-keyring-test-vectors
      - pr-dafny-legacy-test-vectors
    runs-on: ubuntu-22.04
    steps:
      - name: Verify all required jobs passed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
