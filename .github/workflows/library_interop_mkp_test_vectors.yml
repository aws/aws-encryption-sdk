        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-Public-ESDK-Dafny-Role-us-west-2
          role-session-name: InterOpTests
          role-duration-seconds: 3600

      - uses: actions/setup-node@v6
        with:
          node-version: 17

      - name: Install deps
        run: |
          openssl version
          npm install @aws-crypto/integration-node
          npm install fast-xml-parser

      - name: Download Encrypt Manifest Artifact
        uses: actions/download-artifact@v8
        with:
          # we can pick any manifest we want. i choose java because it runs 6 billion devices
          name: ubuntu-22.04_vector_artifact_java_legacy_format_${{github.sha}}
          path: ./${{matrix.library}}

      - name: Create JS decrypt manifest
        working-directory: ${{matrix.library}}
        shell: bash
        run: |
          npx -y @aws-crypto/integration-node encrypt -m encrypt-manifest.json -k keys.json -d decrypt-manifest-js.zip -C

      - name: Upload Encrypt Manifest and keys.json files
        uses: actions/upload-artifact@v7
        with:
          name: ${{matrix.os}}_vector_artifact_javascript_legacy_format_${{github.sha}}
          path: |
            ./${{matrix.library}}/decrypt-manifest-js.zip

