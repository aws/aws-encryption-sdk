            # windows-latest,
            ubuntu-22.04,
          ]
        encrypting_language: [java, net, rust, python, python_mkp, java_mkp, go]
        # https://taskei.amazon.dev/tasks/CrypTool-5284
        dotnet-version: ["6.0.x"]
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Support longpaths on Git checkout
        run: |
          git config --global core.longpaths true

      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      # TestVectors will call KMS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-Public-ESDK-Dafny-Role-us-west-2
          role-session-name: InterOpTests
          role-duration-seconds: 3600

      - uses: actions/setup-node@v6
        with:
          node-version: 17

      - name: Install deps
        run: |
          openssl version
          npm install @aws-crypto/integration-node
          npm install fast-xml-parser

      - name: Download Encrypt Manifest Artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{matrix.os}}_vector_artifact_${{matrix.encrypting_language}}_legacy_format_${{github.sha}}
          path: ./${{matrix.library}}/runtimes/

      # Sadly we have to zip up the artifacts again to be consumed by JS
      - name: Decrypt Generated Test Vectors with ESDK-JS
        working-directory: ${{matrix.library}}/runtimes
        shell: bash
        run: |
          zip -qq tests.zip -r ciphertexts plaintexts *.json

      - name: Decrypt Generated Test Vectors with ESDK-JS
        working-directory: ${{matrix.library}}/runtimes
        shell: bash
        run: |
          npx -y @aws-crypto/integration-node decrypt -v tests.zip -c cpu -f 100 -C

  testWritesWithJs:
    needs: generateMkpKeyringLegacyFormatEncryptVectors
    strategy:
      fail-fast: false
      matrix:
        library: [TestVectors]
        os: [
