name: ESDK Rust Tests

on:
  push:
    branches:
      - aws-crypto-rust/unreviewed

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Support longpaths on Git checkout
        run: git config --global core.longpaths true

      - uses: actions/checkout@v5

      - name: Init Submodules
        run: git submodule update --init --recursive dafny-mpl

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-Public-ESDK-Dafny-Role-us-west-2
          role-session-name: EsdkRustNativeTests

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Setup Dafny
        uses: ./dafny-mpl/.github/actions/setup_dafny
        with:
          dafny-version: 4.10.0

      - name: Setup Java 17 for codegen
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "17"
          cache: "gradle"

      - name: Install smithy-dafny codegen dependencies
        run: make -C dafny-mpl/smithy-dafny mvn_local_deploy_polymorph_dependencies

      - name: Generate MPL Rust bindings
        run: make -C dafny-mpl/AwsCryptographicMaterialProviders polymorph_rust

      - name: Transpile MPL Dafny to Rust
        run: |
          CORES=$(nproc)
          make -C dafny-mpl/AwsCryptographicMaterialProviders transpile_rust CORES=$CORES

      - name: Run ESDK tests
        run: |
          cat > Cargo.toml << 'WKSP'
          [workspace]
          resolver = "3"
          members = ["prim", "mpl", "esdk"]
          WKSP
          rm -f Cargo.lock
          cargo test --release -p aws-esdk
