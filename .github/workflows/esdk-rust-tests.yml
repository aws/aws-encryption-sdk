name: ESDK Rust Tests

on:
  push:
    branches:
      - aws-crypto-rust/unreviewed

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Support longpaths on Git checkout
        run: git config --global core.longpaths true

      - uses: actions/checkout@v5

      - name: Clone Dafny MPL to expected path
        run: |
          # mpl/Cargo.toml has: path = "../../../../../mpl/AwsCryptographicMaterialProviders/runtimes/rust"
          # From mpl/ inside the repo, that's 5 levels up then into mpl/. We resolve the
          # absolute target path and create parent dirs as needed (writable under /home/runner).
          TARGET_DIR="$(cd mpl && python3 -c "import os; print(os.path.abspath('../../../../../mpl'))")"
          mkdir -p "$(dirname "$TARGET_DIR")"
          git clone --depth 1 https://github.com/aws/aws-cryptographic-material-providers-library-dafny.git "$TARGET_DIR"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-Public-ESDK-Dafny-Role-us-west-2
          role-session-name: EsdkRustNativeTests

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Run ESDK tests
        working-directory: esdk
        run: cargo test --release
