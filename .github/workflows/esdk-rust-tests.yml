name: ESDK Rust Tests

on:
  push:
    branches:
      - aws-crypto-rust/unreviewed

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Support longpaths on Git checkout
        run: git config --global core.longpaths true

      - uses: actions/checkout@v5

      - name: Clone Dafny MPL to expected path
        run: |
          # mpl/Cargo.toml references ../../../../../mpl/AwsCryptographicMaterialProviders/runtimes/rust
          # From the repo root that resolves 5 levels up from mpl/, i.e. 4 levels up from repo root.
          # On GHA the repo is at $GITHUB_WORKSPACE, so we clone to the resolved absolute path.
          MPL_TARGET="$(cd "$GITHUB_WORKSPACE" && cd ../../../.. && pwd)/mpl"
          git clone --depth 1 https://github.com/aws/aws-cryptographic-material-providers-library-dafny.git "$MPL_TARGET"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-Public-ESDK-Dafny-Role-us-west-2
          role-session-name: EsdkRustNativeTests

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Run ESDK tests
        working-directory: esdk
        run: cargo test --release
