name: ESDK Rust Tests

on:
  push:
    branches:
      - aws-crypto-rust/unreviewed

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Support longpaths on Git checkout
        run: git config --global core.longpaths true

      - uses: actions/checkout@v5

      - name: Make Dafny MPL available
        run: |
          # mpl/Cargo.toml references:
          #   path = "../../../../../mpl/AwsCryptographicMaterialProviders/runtimes/rust"
          # From the repo root's mpl/ dir, that resolves to /home/mpl/... on GHA.
          # GHA runners have passwordless sudo, so we can create the directory there.
          sudo git clone --depth 1 \
            https://github.com/aws/aws-cryptographic-material-providers-library-dafny.git \
            /home/mpl

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-Public-ESDK-Dafny-Role-us-west-2
          role-session-name: EsdkRustNativeTests

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Run ESDK tests
        working-directory: esdk
        run: cargo test --release
