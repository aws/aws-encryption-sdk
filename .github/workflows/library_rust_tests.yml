# This workflow performs tests in Rust.
name: Library Rust tests

on:
  workflow_call:
    inputs:
      dafny:
        description: "The Dafny version to run"
        required: true
        type: string
      regenerate-code:
        description: "Regenerate code using smithy-dafny"
        required: false
        default: false
        type: boolean

jobs:
  testRust:
    strategy:
      fail-fast: false
      matrix:
        library: [AwsEncryptionSDK]
        os: [
            # windows-latest, #TODO: Windows aren't fully supported.
            ubuntu-22.04,
            # TODO: Re-enable macOS after https://t.corp.amazon.com/P205755286
            # macos-15,
          ]
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Support longpaths on Git checkout
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@v6
      - name: Init Submodules
        shell: bash
        run: |
          git submodule update --init libraries
          git submodule update --init --recursive mpl

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-Public-ESDK-Dafny-Role-us-west-2
          role-session-name: RustTests
          special-characters-workaround: "true" # Some environments (example: windowsOS) cannot tolerate special characters in a secret key.

      - name: Setup Rust Toolchain for GitHub CI
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Setup Dafny
        uses: ./mpl/.github/actions/setup_dafny
        with:
          dafny-version: 4.10.0

      - name: Setup Java 17 for codegen
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "17"

      - name: Setup NASM for Windows (aws-lc-sys)
        if: matrix.os == 'windows-latest'
        uses: ilammy/setup-nasm@v1

      - name: Install Smithy-Dafny codegen dependencies
        uses: ./mpl/.github/actions/install_smithy_dafny_codegen_dependencies
        with:
          mpl-submodule-path: mpl/

      - name: Regenerate code using smithy-dafny if necessary
        if: ${{ inputs.regenerate-code }}
        uses: ./.github/actions/polymorph_codegen
        with:
          dafny: ${{ env.DAFNY_VERSION }}
          library: ${{ matrix.library }}
          diff-generated-code: false
          update-and-regenerate-mpl: true

      - name: Run make polymorph_rust
        shell: bash
        working-directory: ${{ matrix.library }}
        run: |
          make polymorph_rust

      - name: Compile ${{ matrix.library }} implementation
        shell: bash
        working-directory: ${{ matrix.library }}
        run: |
          # This works because `node` is installed by default on GHA runners
          CORES=$(node -e 'console.log(os.cpus().length)')
          make transpile_rust CORES=$CORES

      - name: Run clippy
        working-directory: ${{ matrix.library }}/runtimes/rust
        shell: bash
        run: |
          cargo clippy
          cargo clippy --example main

      - name: Test Rust
        working-directory: ${{ matrix.library }}
        shell: bash
        run: |
          make test_rust test_rust_debug

      - name: Test Examples for Rust
        working-directory: ${{ matrix.library }}/runtimes/rust
        shell: bash
        run: |
          cargo test --release --examples

  testVectors:
    strategy:
      fail-fast: false
      matrix:
        library: [TestVectors]
        os: [
            # Sed script doesn't work properly on windows
            # windows-latest,
            ubuntu-22.04,
            # TODO: Re-enable macOS after https://t.corp.amazon.com/P205755286
            # macos-15,
          ]
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Support longpaths on Git checkout
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@v6
      - name: Init Submodules
        shell: bash
        run: |
          git submodule update --init libraries
          git submodule update --init --recursive mpl

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::370957321024:role/GitHub-CI-Public-ESDK-Dafny-Role-us-west-2
          role-session-name: RustTestVectors
          special-characters-workaround: "true" # Some environments (example: windowsOS) cannot tolerate special characters in a secret key.

      - name: Setup Rust Toolchain for GitHub CI
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Setup Dafny
        uses: ./mpl/.github/actions/setup_dafny
        with:
          dafny-version: 4.10.0

      - name: Setup Java 17 for codegen
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "17"

      - name: Setup NASM for Windows (aws-lc-sys)
        if: matrix.os == 'windows-latest'
        uses: ilammy/setup-nasm@v1

      - name: Install Smithy-Dafny codegen dependencies
        uses: ./mpl/.github/actions/install_smithy_dafny_codegen_dependencies
        with:
          mpl-submodule-path: mpl/

      - name: Regenerate code using smithy-dafny if necessary
        if: ${{ inputs.regenerate-code }}
        uses: ./.github/actions/polymorph_codegen
        with:
          dafny: ${{ env.DAFNY_VERSION }}
          library: ${{ matrix.library }}
          diff-generated-code: false
          update-and-regenerate-mpl: true

      - name: Run make polymorph_rust
        shell: bash
        working-directory: ${{ matrix.library }}
        run: |
          make polymorph_rust

      - name: Compile ${{ matrix.library }} implementation
        shell: bash
        working-directory: ${{ matrix.library }}
        run: |
          # This works because `node` is installed by default on GHA runners
          CORES=$(node -e 'console.log(os.cpus().length)')
            make transpile_rust CORES=$CORES

      - name: Unzip .NET Retry Flag Manifests
        shell: bash
        working-directory: TestVectors/dafny/TestVectors/test/
        run: |
          unzip invalid-Net-4.0.0.zip -d invalid-Net-4.0.0
          unzip v4-Net-4.0.1.zip -d v4-Net-4.0.1
          unzip valid-Net-4.0.0.zip -d valid-Net-4.0.0

      - name: Test Rust
        working-directory: ${{ matrix.library }}/runtimes/rust
        shell: bash
        run: |
          # Without this, running test vectors fails due to `fatal runtime error: stack overflow`
          export RUST_MIN_STACK=104857600
          cargo test --release -- --test-threads 1 --nocapture

      - name: Test ${{ matrix.library }} Rust Fips
        shell: bash
        working-directory: ./${{ matrix.library }}/runtimes/rust
        run: |
          # Without this, running test vectors fails due to `fatal runtime error: stack overflow`
          export RUST_MIN_STACK=104857600
          cargo test --release --features fips -- --nocapture
