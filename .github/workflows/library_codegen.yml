# This workflow regenerates code using smithy-dafny and checks that the output matches what's checked in.
name: Library Code Generation
on:
  workflow_call:
    inputs:
      dafny:
        description: "The Dafny version to run"
        required: true
        type: string

jobs:
  code-generation:
    strategy:
      fail-fast: false
      matrix:
        library: [AwsEncryptionSDK]
        # Note dotnet is only used for formatting generated code
        # in this workflow
        dotnet-version: ["6.0.x"]
        go-version: [1.24]
        os: [ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1
    steps:
      - name: Support longpaths
        run: |
          git config --global core.longpaths true

      - uses: actions/checkout@v7
      # The specification submodule is private so we don't have access, but we don't need
      # it to verify the Dafny code. Instead we manually pull the submodules we DO need.
      - run: git submodule update --init libraries
      - run: git submodule update --init --recursive mpl

      # Only used to format generated code
      # and to translate version strings such as "nightly-latest"
      # to an actual DAFNY_VERSION.
      - name: Setup Dafny
        uses: ./mpl/.github/actions/setup_dafny
        with:
          dafny-version: ${{ inputs.dafny }}

      - name: Setup .NET Core SDK ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      # even though we just installed dotnet 6, maybe dotnet 8 is out there somewhere
      - name: Create temporary global.json
        run: echo '{"sdk":{"rollForward":"latestFeature","version":"6.0.0"}}' > ./global.json

      - name: Setup Java 17 for codegen
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "17"

      - name: Install Smithy-Dafny codegen dependencies
        uses: ./mpl/.github/actions/install_smithy_dafny_codegen_dependencies
        with:
          mpl-submodule-path: mpl/

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install Smithy-Dafny codegen dependencies
        uses: ./mpl/.github/actions/install_smithy_dafny_codegen_dependencies
        with:
          mpl-submodule-path: mpl/

      - uses: ./.github/actions/polymorph_codegen
        with:
          dafny: ${{ env.DAFNY_VERSION }}
          library: ${{ matrix.library }}
          diff-generated-code: true
