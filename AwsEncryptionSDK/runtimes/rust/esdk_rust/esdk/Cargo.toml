
[package]
name = "aws-esdk"
version = "0.1.0"
edition = "2024"
autoexamples = false

[dependencies]
aws-mpl-legacy = { path = "/Users/ajewell/head/aws-cryptographic-material-providers-library/AwsCryptographicMaterialProviders/runtimes/rust" }
aws-smithy-types = "1.3.4"
tokio = "1.48.0"
aws-mpl-primitives = { path = "/Users/ajewell/esdk_rust/prim" }
aws-mpl-rs = { path = "/Users/ajewell/esdk_rust/mpl" }
derivative = "2.2.0"
derive_builder = "0.20.2"

clap = { version = "4.5.53", features = ["derive"], optional = true }
serde_json = { version = "1.0.145", optional = true }
anyhow = { version = "1.0.100", optional = true }
base64 = { version = "0.22.1", optional = true }
aws-sdk-kms = { version = "1.94.0", optional = true }
aws-config = { version = "1.8.12", optional = true }

# Necessary for examples
[dev-dependencies]
pem = "3.0.6"
aws-config = "1.8.10"
aws-sdk-kms = "1.94.0"
aws-sdk-dynamodb = "1.98.0"
aws-lc-rs = {version = "1.15.2"}
rand = "0.9.2"

[[example]]
name = "main"

[[bin]]
name = "test_vector"
path = "src/bin/test_vector/main.rs"
required-features = ["test_vectors"]  # Only build binary when test_vectors feature is enabled

[package.metadata.docs.rs]
features = ["test_vectors"]
rustdoc-args = [
    "--generate-link-to-definition",
    "--generate-macro-expansion",
]

[features]
# default = []
default = ["test_vectors"]
test_vectors = ["clap", "serde_json", "anyhow", "base64", "aws-sdk-kms",  "aws-config"]  # Users can enable with --features test_vectors
fips = ["aws-mpl-primitives/fips"]
