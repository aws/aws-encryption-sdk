
[package]
name = "aws-esdk"
version = "0.1.0"
edition = "2024"
autoexamples = false

[dependencies]
aws-smithy-types = "1.3.4" # needed for error for legacy EDK Builder
# tokio only needed for tests and test_vectors
tokio = { version = "1.49.0", features = ["rt", "macros", "rt-multi-thread"]  }
aws-mpl-primitives = { path = "../prim" }
aws-mpl-rs = { path = "../mpl" }

clap = { version = "4.5.54", features = ["derive"], optional = true }
serde_json = { version = "1.0.148", optional = true }
anyhow = { version = "1.0.100", optional = true }
base64 = { version = "0.22.1", optional = true }
aws-sdk-kms = { version = "1.94.0", optional = true }
aws-config = { version = "1.8.12", optional = true }
aws-mpl-legacy = { version = "0.1.0", optional = true }
async-trait = "0.1.89"

# Necessary for examples
[dev-dependencies]
pem = "3.0.6"
aws-config = "1.8.10"
aws-sdk-kms = "1.94.0"
aws-sdk-dynamodb = "1.98.0"
aws-lc-rs = {version = "1.15.2"}
rand = "0.9.2"

[[example]]
name = "main"

[[bin]]
name = "test_vector"
path = "src/bin/test_vector/main.rs"
required-features = ["test_vectors"]  # Only build binary when test_vectors feature is enabled

[package.metadata.docs.rs]
all-features = true
# features = ["test_vectors"]
rustdoc-args = [
    "--generate-link-to-definition",
    "--generate-macro-expansion",
     "--cfg", "docsrs",
]

[features]
# default = ["kms", "ddb"]
default = ["kms", "ddb", "test_vectors", "legacy"]
test_vectors = ["clap", "serde_json", "anyhow", "base64", "aws-sdk-kms",  "aws-config"]  # without "kms" or "ddb", only processes raw keyrings
fips = ["aws-mpl-primitives/fips"]
kms = ["aws-mpl-rs/kms"]
ddb = ["aws-mpl-rs/ddb"]
legacy = ["aws-mpl-legacy", "tokio/full"]
